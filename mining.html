<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mining Event - Stardew Valley</title>
  <link href="https://fonts.googleapis.com/css2?family=Micro+5&display=swap" rel="stylesheet" />

  <style>
    /* --- SETUP LAYAR PENUH --- */
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      /* Hilangkan scrollbar */
      background-color: #000;
      font-family: "Micro 5", sans-serif;
      user-select: none;
      /* Biar gambar gak ke-blok biru saat tekan tombol lama */
    }

    /* --- BACKGROUND --- */
    .game-scene {
      position: relative;
      width: 100%;
      height: 100%;
      background-image: url("assets/img/latar2.png");
      background-size: cover;
      background-position: center;
      image-rendering: pixelated;
    }

    /* --- BATU TARGET --- */
    .rock {
      position: absolute;
      /* Posisi batu diatur agar pas di tanah */
      bottom: 42%;
      left: 57%;

      width: 50px;
      /* Ukuran batu */
      height: auto;
      z-index: 5;
      transition: transform 0.1s;
    }

    /* --- PEMAIN (PLAYER) --- */
    .player {
      position: absolute;
      bottom: 44%;
      /* Sedikit lebih atas dari batu biar perspektifnya pas */

      /* Posisi Awal: Di Kanan Layar (90%) */
      left: 90%;

      width: 45px;
      /* UKURAN KECIL (Sesuai request) */
      height: auto;
      z-index: 10;

      /* Dibalik agar menghadap kiri */
      transform: scaleX(1);
    }

    /* --- TOMBOL MINESTONE (Interaksi) --- */
    .mine-btn-img {
      position: absolute;
      /* Muncul di atas batu */
      bottom: 55%;
      left: 57%;
      /* Geser dikit biar pas tengah batu */
      transform: translateX(10%);

      width: 100px;
      height: auto;
      z-index: 20;
      cursor: pointer;

      display: none;
      /* Sembunyi dulu, muncul kalau dekat */
      animation: floatUp 1s infinite alternate;
    }

    .mine-btn-img:hover {
      filter: brightness(1.1);
    }

    @keyframes floatUp {
      from {
        transform: translate(10%, 0);
      }

      to {
        transform: translate(10%, -5px);
      }
    }


    /* --- POPUP HADIAH --- */
    .reward-popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);

      background-color: rgba(255, 255, 230, 0.95);
      border: 4px solid #d87802;
      border-radius: 15px;
      padding: 20px 40px;
      text-align: center;
      z-index: 100;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .reward-popup.show {
      transform: translate(-50%, -50%) scale(1);
    }

    .reward-icon {
      width: 60px;
      height: auto;
      margin-bottom: 10px;
      image-rendering: pixelated;
    }

    .reward-text {
      font-size: 32px;
      color: #5e2c04;
      margin: 0;
    }

    .btn-ok {
      margin-top: 15px;
      background: #d87802;
      color: white;
      border: 3px solid #8b4513;
      padding: 5px 30px;
      font-size: 24px;
      font-family: inherit;
      border-radius: 50px;
      cursor: pointer;
    }

    .btn-ok:hover {
      background: #e68a2e;
    }

    .btn-inventory {
      margin-top: 15px;
      margin-left: 10px;
      background: #FFCF85;
      color: #5e2c04;
      border: 3px solid #8b4513;
      padding: 5px 30px;
      font-size: 24px;
      font-family: inherit;
      border-radius: 50px;
      cursor: pointer;
    }

    .btn-inventory:hover {
      background: #f4ca90;
    }
  </style>
</head>

<body>
  <div class="game-scene">


    <img src="assets/img/minestone.png" class="mine-btn-img" id="mineBtn" onclick="hitRock()" />

    <img src="assets/img/stone.png" alt="Rock" id="rockObj" class="rock" />

    <img src="assets/img/actor1.png" alt="Player" id="playerObj" class="player" />

    <div class="reward-popup" id="rewardPopup">
      <img src="assets/img/stone.png" alt="Reward" class="reward-icon" />
      <p class="reward-text">You got Stone x1!</p>
      <button class="btn-ok" onclick="location.reload()">OK</button>
      <button class="btn-inventory" onclick="goToInventory()">Inventory</button>
    </div>
  </div>

  <script>
    const player = document.getElementById("playerObj");
    const rock = document.getElementById("rockObj");
    const mineBtn = document.getElementById("mineBtn");
    const popup = document.getElementById("rewardPopup");

    function goToInventory() {
      window.location.href = 'inventory.html';
    }

    // STATUS GAME
    let playerPosX = 90; // Posisi Horizontal (Persen)
    let isMovingLeft = false; // Status tombol ditekan
    let isWalking = false; // Status animasi jalan
    let walkInterval; // Interval animasi kaki
    let gameLoop; // Interval logika game (gerakan)
    let clickCount = 0;
    let targetReached = false;

    // TARGET POSISI (Batu ada di kiri 57%, jadi stop di sekitar 60%)
    const STOP_POINT = 60;

    // --- 1. DETEKSI TOMBOL DITEKAN (MULAI JALAN) ---
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft" && !targetReached) {
        if (!isMovingLeft) {
          isMovingLeft = true;
          startGameLoop();
        }
      }
    });

    // --- 2. DETEKSI TOMBOL DILEPAS (BERHENTI) ---
    document.addEventListener("keyup", (event) => {
      if (event.key === "ArrowLeft") {
        isMovingLeft = false;
        // Jangan langsung stop loop di sini, biarkan loop yang handle berhenti
        // agar lebih smooth atau untuk logika deselerasi (opsional)
        stopGameLoop();
      }
    });

    // GAME LOOP UTAMA
    function startGameLoop() {
      if (gameLoop) return; // Jangan double loop

      // Mulai Animasi Kaki
      if (!isWalking) {
        isWalking = true;
        startLegAnimation();
      }

      gameLoop = setInterval(() => {
        if (isMovingLeft) {
          movePlayer();
        }
      }, 16); // ~60 FPS
    }

    function stopGameLoop() {
      clearInterval(gameLoop);
      gameLoop = null;

      // Stop Animasi Kaki
      isWalking = false;
      clearInterval(walkInterval);
      player.src = "assets/img/actor1.png"; // Kembali diam
    }

    // FUNGSI GERAKAN
    function movePlayer() {
      // Kalau posisi masih lebih besar dari titik stop
      if (playerPosX > STOP_POINT) {
        playerPosX -= 0.13; // Kecepatan per frame (60fps x 0.3 = lumayan cepat)
        player.style.left = playerPosX + "%";
      } else {
        // SUDAH SAMPAI
        stopGameLoop();
        targetReached = true;
        mineBtn.style.display = "block";
      }
    }

    // ANIMASI KAKI (Ganti Gambar Actor 1 <-> Actor 2)
    function startLegAnimation() {
      let toggle = true;
      if (walkInterval) clearInterval(walkInterval);

      // Langsung ganti ke frame jalan pertama biar responsif
      player.src = "assets/img/actor2.png";

      walkInterval = setInterval(() => {
        if (toggle) {
          player.src = "assets/img/actor1.png";
        } else {
          player.src = "assets/img/actor2.png";
        }
        toggle = !toggle;
      }, 120);
    }

    // --- 3. LOGIKA MEMUKUL BATU ---
    // DAFTAR ITEM YANG BISA DIDAPAT
    // DAFTAR ITEM YANG BISA DIDAPAT
    const drops = [
      { img: "assets/img/Cave_Carrot.png", name: "Cave Carrot" },
      { img: "assets/img/greyStone1.png", name: "The Mountain" },
      { img: "assets/img/Fried_Egg.png", name: "Fried Egg" },
      { img: "assets/img/Iridium_Ore.png", name: "Iridium Ore" },
      { img: "assets/img/Qi_Gem.png", name: "Qi Gem" },
      { img: "assets/img/Ruby.png", name: "Ruby" },
      { img: "assets/img/Sap.png", name: "Sap" },
      { img: "assets/img/Gold_Ore.png", name: "Gold Ore" },
      { img: "assets/img/Fire_Quartz.png", name: "Fire Quartz" },
      { img: "assets/img/Emerald.png", name: "Emerald" },
      { img: "assets/img/Omni_Geode.png", name: "Omni Geode" },
      { img: "assets/img/Copper_Ore.png", name: "Copper Ore" },
      { img: "assets/img/Bomb.png", name: "Bomb" }
    ];

    function hitRock() {
      clickCount++;

      // Efek Animasi Terpukul
      rock.style.transform = "scale(0.9) rotate(5deg)";
      setTimeout(() => {
        rock.style.transform = "scale(1) rotate(0deg)";
      }, 100);

      if (clickCount === 1) {
        // KLIK PERTAMA: Batu Retak
        rock.src = "assets/img/crackedStone.png";
        rock.style.width = "55px";
      } else if (clickCount === 2) {
        // KLIK KEDUA: Hancur jadi item RANDOM
        const randomDrop = drops[Math.floor(Math.random() * drops.length)];

        rock.src = randomDrop.img;
        rock.style.width = "40px";
        mineBtn.style.display = "none";

        // Batu jadi bisa diklik untuk diambil
        rock.style.cursor = "pointer";
        rock.onclick = function () {
          rock.style.display = "none";

          // Update Popup sesuai item yang didapat
          document.querySelector(".reward-icon").src = randomDrop.img;
          document.querySelector(".reward-text").innerText = `You got ${randomDrop.name} x1!`;

          popup.classList.add("show");
        };
      }
    }
  </script>
</body>

</html>
